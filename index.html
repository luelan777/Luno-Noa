<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d0f1a" id="theme-meta">
    <meta name="description" content="Luno-Noa - AI Chatbot powered by Flowise">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Luno">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Luno</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><circle cx='90' cy='90' r='85' fill='%23e8559a'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><circle cx='90' cy='90' r='85' fill='%23e8559a'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #121d33;
            --surface: rgba(18, 29, 51, 0.92);
            --surface2: rgba(22, 34, 58, 0.95);
            --border: rgba(150, 180, 220, 0.12);
            --border-hi: rgba(232, 85, 154, 0.28);
            --text: #e8edf5;
            --text-muted: #8898c0;
            --text-faint: #2e3d60;
            --input-bg: rgba(14, 22, 40, 0.92);
            --pink: #e8559a;
            --pink-soft: #f0a0c8;
            --pink-glow: rgba(232, 85, 154, 0.25);
            --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="light"] {
            --bg: #f2ecf8;
            --surface: rgba(242, 236, 250, 0.92);
            --surface2: rgba(235, 228, 248, 0.96);
            --border: rgba(180, 120, 200, 0.14);
            --border-hi: rgba(204, 68, 136, 0.28);
            --text: #2a1a38;
            --text-muted: #7a5090;
            --text-faint: #c0a8d0;
            --input-bg: rgba(248, 242, 255, 0.96);
            --pink: #cc4488;
            --pink-soft: #e890bc;
            --pink-glow: rgba(204, 68, 136, 0.18);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        *::before, *::after { box-sizing: border-box; }

        html { height: 100%; -webkit-text-size-adjust: 100%; -webkit-user-select: none; user-select: none; }

        body {
            height: 100%;
            font-family: var(--font);
            color: var(--text);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            transition: background 600ms var(--ease), color 400ms var(--ease);
            width: 100%;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
        }

        button { cursor: pointer; background: none; border: none; font: inherit; color: inherit; -webkit-user-select: none; user-select: none; -webkit-tap-highlight-color: transparent; }
        textarea, input { font: inherit; color: inherit; -webkit-user-select: text; user-select: text; }

        @media (prefers-reduced-motion: reduce) { * { animation-duration: 0.01ms !important; transition-duration: 0.01ms !important; } }

        .container {
            width: 100%;
            max-width: 500px;
            height: 100%;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
            z-index: 1;
            overflow: hidden;
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            flex-shrink: 0;
            z-index: 20;
        }

        .top-bar-title {
            font-size: 1.1rem;
            font-weight: 600;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-faint);
        }

        .top-bar-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: var(--text-muted);
            transition: all 200ms var(--ease);
            flex-shrink: 0;
            pointer-events: auto;
        }
        .btn-icon:hover { background: var(--surface2); color: var(--pink); }
        .btn-icon:active { transform: scale(0.95); }
        .btn-icon svg { width: 20px; height: 20px; }

        /* Status Bar */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 4px 16px;
            flex-shrink: 0;
        }

        .emotion-selector {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface2);
            cursor: pointer;
            transition: all 200ms var(--ease);
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .emotion-selector:hover { border-color: var(--border-hi); }
        .emotion-emoji { font-size: 1rem; line-height: 1; }
        .emotion-text { font-size: 0.75rem; font-weight: 500; letter-spacing: 0.02em; }

        .emotion-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            opacity: 0;
            visibility: hidden;
            transition: all 200ms var(--ease);
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            min-width: 180px;
        }
        .emotion-dropdown.show { opacity: 1; visibility: visible; transform: translateX(-50%) scale(1); }

        .emotion-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 8px 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 150ms var(--ease);
        }
        .emotion-option:hover { background: var(--pink-glow); }
        .emotion-option .emoji { font-size: 1.2rem; }
        .emotion-option .label { font-size: 0.6rem; color: var(--text-faint); white-space: nowrap; }

        .connection-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface2);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all 300ms var(--ease);
        }
        .connection-dot { width: 7px; height: 7px; border-radius: 50%; transition: background 300ms var(--ease); }
        .connection-badge.online .connection-dot { background: #22c55e; box-shadow: 0 0 6px rgba(34,197,94,0.5); }
        .connection-badge.online { color: #22c55e; border-color: rgba(34,197,94,0.25); }
        .connection-badge.unstable .connection-dot { background: #f59e0b; box-shadow: 0 0 6px rgba(245,158,11,0.5); }
        .connection-badge.unstable { color: #f59e0b; border-color: rgba(245,158,11,0.25); }
        .connection-badge.offline .connection-dot { background: #ef4444; box-shadow: 0 0 6px rgba(239,68,68,0.5); }
        .connection-badge.offline { color: #ef4444; border-color: rgba(239,68,68,0.25); }

        /* Orb Background (fixed behind everything) */
        .orb-stage {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 12px;
            pointer-events: none;
            z-index: 0;
            opacity: 0.35;
            transition: opacity 600ms var(--ease);
        }
        [data-theme="light"] .orb-stage { opacity: 0.35; }
        .orb-stage.thinking-glow { opacity: 0.5; }
        [data-theme="light"] .orb-stage.thinking-glow { opacity: 0.5; }
        .orb-wrapper { position: relative; width: 280px; height: 280px; display: flex; align-items: center; justify-content: center; animation: orbBreathe 3.5s ease-in-out infinite; }
        .orb-wrapper.thinking { animation: orbBreatheThinking 1.2s ease-in-out infinite; }
        #orb-canvas { display: block; width: 100%; height: 100%; }

        @keyframes orbBreathe { 0%, 100% { transform: scale(0.95); } 50% { transform: scale(1.05); } }
        @keyframes orbBreatheThinking { 0%, 100% { transform: scale(0.90); } 50% { transform: scale(1.10); } }
        .status-label {
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-muted);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 400ms var(--ease);
            opacity: 1;
        }
        .status-label.active { color: var(--pink); }
        .status-dot { width: 6px; height: 6px; border-radius: 50%; background: currentColor; }
        .status-dot.pulse { animation: pulse 1.2s ease-in-out infinite; }

        @keyframes pulse { 0%, 100% { opacity: 1; transform: scale(1); } 50% { opacity: 0.5; transform: scale(0.8); } }

        /* Chat Panel */
        .chat-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            background: transparent;
            padding: 12px 16px max(16px, env(safe-area-inset-bottom));
            gap: 10px;
            transition: background 600ms var(--ease);
            overflow: hidden;
            z-index: 10;
            position: relative;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 6px;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
        }
        .messages-container::-webkit-scrollbar { width: 4px; }
        .messages-container::-webkit-scrollbar-track { background: transparent; }
        .messages-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

        /* Date Separator */
        .date-separator {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 8px 0 4px;
        }
        .date-separator span {
            font-size: 0.65rem;
            color: var(--text-faint);
            letter-spacing: 0.05em;
            background: var(--surface2);
            padding: 3px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
        }

        /* Messages */
        .message-wrapper {
            display: flex;
            flex-direction: column;
            gap: 2px;
            animation: slideIn 280ms var(--ease);
        }
        .message-wrapper.user { align-items: flex-end; }
        .message-wrapper.assistant { align-items: flex-start; }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
        }
        .message.user {
            background: rgba(232, 85, 154, 0.14);
            border: 1px solid rgba(232, 85, 154, 0.28);
            border-bottom-right-radius: 4px;
            color: var(--text);
        }
        [data-theme="light"] .message.user { background: rgba(204, 68, 136, 0.09); border-color: rgba(204, 68, 136, 0.18); }
        .message.assistant {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text);
        }

        .message-time {
            font-size: 0.6rem;
            color: var(--text-faint);
            padding: 0 4px;
            letter-spacing: 0.02em;
        }

        .message.image-preview { max-width: 100%; padding: 6px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; }
        .message.image-preview img { max-width: 160px; max-height: 130px; border-radius: 8px; display: block; }

        .typing-indicator { display: flex; gap: 4px; align-self: flex-start; padding: 10px 14px; }
        .typing-dot { width: 6px; height: 6px; border-radius: 50%; background: var(--text-faint); animation: typing 1.2s ease-in-out infinite; }
        .typing-dot:nth-child(2) { animation-delay: 0.2s; }
        .typing-dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes typing { 0%, 100% { transform: translateY(0); opacity: 0.4; } 50% { transform: translateY(-6px); opacity: 1; } }
        @keyframes slideIn { from { opacity: 0; transform: translateY(8px) scale(0.98); } to { opacity: 1; transform: translateY(0) scale(1); } }

        /* Toolbar */
        .toolbar { display: flex; flex-direction: column; gap: 8px; flex-shrink: 0; }
        .image-preview-box { display: none; align-items: center; gap: 8px; padding: 8px 12px; background: var(--surface2); border: 1px solid var(--border); border-radius: 12px; animation: slideIn 200ms var(--ease); }
        .image-preview-box.show { display: flex; }
        .image-preview-box img { width: 36px; height: 36px; border-radius: 6px; object-fit: cover; }
        .image-preview-box button { margin-left: auto; padding: 4px; color: var(--pink); font-size: 1.2rem; line-height: 1; }

        .capabilities-chips { display: flex; gap: 8px; overflow-x: auto; scrollbar-width: none; max-height: 0; overflow: hidden; opacity: 0; transition: max-height 320ms var(--ease), opacity 260ms var(--ease); }
        .capabilities-chips::-webkit-scrollbar { display: none; }
        .capabilities-chips.show { max-height: 44px; opacity: 1; }

        .chip { display: inline-flex; align-items: center; gap: 6px; padding: 7px 14px; border-radius: 999px; border: 1px solid var(--border); background: var(--surface2); font-size: 0.75rem; color: var(--text-muted); white-space: nowrap; flex-shrink: 0; transition: all 160ms var(--ease); }
        .chip:hover { border-color: var(--border-hi); color: var(--pink); transform: translateY(-1px); }
        .chip.active { border-color: var(--pink); color: var(--pink); background: rgba(232, 85, 154, 0.08); }
        .chip svg { width: 12px; height: 12px; }

        /* Input Area */
        .input-area {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 8px 8px 14px;
            transition: border-color 200ms var(--ease), box-shadow 200ms var(--ease);
            flex-shrink: 0;
        }
        .input-area:focus-within { border-color: var(--border-hi); box-shadow: 0 0 0 3px var(--pink-glow); }

        #message-input { flex: 1; background: none; border: none; outline: none; padding: 10px 0; min-height: 40px; max-height: 120px; resize: none; font-size: 0.95rem; line-height: 1.4; color: var(--text); }
        #message-input::placeholder { color: var(--text-faint); }

        .input-actions { display: flex; align-items: center; gap: 4px; padding-bottom: 2px; flex-shrink: 0; }

        .btn-send {
            background: var(--pink);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 200ms var(--ease);
            flex-shrink: 0;
        }
        .btn-send:hover:not(:disabled) { transform: scale(1.08); box-shadow: 0 4px 12px var(--pink-glow); }
        .btn-send:active:not(:disabled) { transform: scale(0.95); }
        .btn-send:disabled { opacity: 0.4; cursor: not-allowed; }
        .btn-send svg { width: 18px; height: 18px; stroke-width: 2.5; }

        /* Noa Menu Button */
        .noa-menu-btn {
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface2);
            color: var(--text-muted);
            font-size: 0.72rem;
            font-weight: 500;
            transition: all 200ms var(--ease);
        }
        .noa-menu-btn:hover { border-color: var(--border-hi); color: var(--pink); }

        /* Noa Dropdown Menu */
        .noa-dropdown {
            position: absolute;
            top: calc(100% + 8px);
            right: 0;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px;
            min-width: 200px;
            opacity: 0;
            visibility: hidden;
            transform: translateY(8px);
            transition: all 200ms var(--ease);
            z-index: 200;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
        }
        .noa-dropdown.show { opacity: 1; visibility: visible; transform: translateY(0); }

        .noa-dropdown-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 10px 12px;
            border-radius: 10px;
            font-size: 0.82rem;
            color: var(--text);
            transition: all 150ms var(--ease);
            width: 100%;
            text-align: left;
        }
        .noa-dropdown-item:hover { background: var(--pink-glow); color: var(--pink); }
        .noa-dropdown-item .item-icon { font-size: 1.1rem; }

        /* Config Sheet */
        .config-sheet {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1000;
            visibility: hidden;
            pointer-events: none;
            transition: visibility 400ms var(--ease);
            display: flex;
            align-items: flex-end;
            justify-content: center;
        }
        .config-sheet.open { visibility: visible; pointer-events: auto; }

        .sheet-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 400ms var(--ease);
        }
        .config-sheet.open .sheet-overlay { opacity: 1; }

        .sheet-content {
            position: relative;
            width: 100%;
            max-width: 500px;
            background: var(--surface2);
            border-top: 1px solid var(--border);
            border-radius: 24px 24px 0 0;
            padding: 24px 20px max(24px, env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 400ms var(--ease);
            max-height: 90dvh;
            overflow-y: auto;
            scrollbar-width: thin;
        }
        .config-sheet.open .sheet-content { transform: translateY(0); }

        .sheet-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; gap: 12px; }
        .sheet-header h2 { font-size: 1.1rem; font-weight: 500; letter-spacing: 0.02em; }
        .sheet-header .btn-icon { margin-right: -8px; }

        .config-field { margin-bottom: 16px; }
        .config-field label { display: block; font-size: 0.72rem; text-transform: uppercase; letter-spacing: 0.1em; color: var(--text-muted); margin-bottom: 8px; font-weight: 500; }
        .config-field input { width: 100%; background: var(--input-bg); border: 1px solid var(--border); border-radius: 12px; padding: 12px 14px; color: var(--text); font-size: 0.9rem; outline: none; transition: border-color 200ms var(--ease); }
        .config-field input:focus { border-color: var(--pink); }
        .config-field input::placeholder { color: var(--text-faint); }

        .config-actions { display: flex; flex-direction: column; gap: 12px; padding-top: 12px; border-top: 1px solid var(--border); margin-top: 16px; }

        .config-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 200ms var(--ease);
            cursor: pointer;
        }
        .config-btn:hover { border-color: var(--border-hi); background: var(--surface2); color: var(--pink); }
        .config-btn svg { width: 16px; height: 16px; }

        .btn-connect {
            background: var(--pink);
            color: white;
            border: none;
            font-weight: 600;
        }
        .btn-connect:hover { background: #d44a8a; color: white; transform: scale(1.02); }

        /* Diary Sheet */
        .diary-sheet {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            z-index: 1100;
            visibility: hidden;
            pointer-events: none;
            transition: visibility 400ms var(--ease);
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .diary-sheet.open { visibility: visible; pointer-events: auto; }
        .diary-sheet.open .sheet-overlay { opacity: 1; }

        .diary-content {
            position: relative;
            width: 95%;
            max-width: 500px;
            max-height: 90dvh;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 20px;
            padding: 24px;
            overflow-y: auto;
            transform: scale(0.95);
            opacity: 0;
            transition: all 300ms var(--ease);
        }
        .diary-sheet.open .diary-content { transform: scale(1); opacity: 1; }

        .diary-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; }
        .diary-header h2 { font-size: 1rem; font-weight: 600; color: var(--pink); }

        .diary-toolbar { display: flex; gap: 6px; margin-bottom: 12px; flex-wrap: wrap; }
        .diary-toolbar button {
            padding: 5px 10px;
            border-radius: 8px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            font-size: 0.7rem;
            transition: all 150ms var(--ease);
        }
        .diary-toolbar button:hover { border-color: var(--pink); color: var(--pink); }
        .diary-toolbar button.active { background: var(--pink-glow); border-color: var(--pink); color: var(--pink); }

        .pin-colors { display: flex; gap: 4px; align-items: center; }
        .pin-dot { width: 14px; height: 14px; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: all 150ms var(--ease); }
        .pin-dot:hover { transform: scale(1.2); }
        .pin-dot.active { border-color: var(--text); }

        .diary-input {
            width: 100%;
            min-height: 140px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 16px;
            color: var(--text);
            font-size: 1rem;
            line-height: 1.7;
            resize: vertical;
            outline: none;
            margin-bottom: 12px;
        }
        .diary-input:focus { border-color: var(--pink); }

        .diary-save-btn {
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            background: var(--pink);
            color: white;
            font-weight: 600;
            font-size: 0.85rem;
            margin-bottom: 16px;
        }

        .diary-entries { display: flex; flex-direction: column; gap: 8px; }
        .diary-entry {
            padding: 16px 16px 16px 20px;
            border-radius: 14px;
            border: 1px solid var(--border);
            background: var(--surface);
            position: relative;
            border-left: 4px solid var(--pink);
        }
        .diary-entry-pin {
            position: absolute;
            top: 8px;
            right: 8px;
            width: 10px;
            height: 10px;
            border-radius: 50%;
        }
        .diary-entry-date { font-size: 0.68rem; color: var(--text-faint); margin-bottom: 6px; letter-spacing: 0.02em; }
        .diary-entry-text { font-size: 0.9rem; color: var(--text); line-height: 1.7; white-space: pre-wrap; }

        .diary-export-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 6px;
            width: 100%;
            padding: 10px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text-muted);
            font-size: 0.8rem;
            font-weight: 500;
            margin-bottom: 16px;
            transition: all 200ms var(--ease);
        }
        .diary-export-btn:hover { border-color: var(--pink); color: var(--pink); }

        /* Hidden */
        #file-input { display: none; }

        /* Typing label */
        .typing-label {
            font-size: 0.68rem;
            color: var(--pink-soft);
            padding: 2px 12px;
            letter-spacing: 0.03em;
            animation: fadeInOut 1.5s ease-in-out infinite;
        }
        @keyframes fadeInOut { 0%, 100% { opacity: 0.5; } 50% { opacity: 1; } }

        /* Responsive */
        @media (max-width: 480px) {
            .container { max-width: 100%; }
            .orb-wrapper { width: 200px; height: 200px; }
            .message { font-size: 0.85rem; }
            .chat-panel { height: 50dvh; }
        }

        /* Keyboard open - only hide status bar for more space */
        .keyboard-open .status-bar { opacity: 0; height: 0; overflow: hidden; padding: 0; margin: 0; transition: all 150ms ease; }
    </style>
</head>
<body>

    <!-- Hidden Input -->
    <input type="file" id="file-input" accept="image/*" onchange="handleFileInput(event)">

    <script>
        // ============================================================================
        // CONFIGURATION & STATE
        // ============================================================================
        const CONFIG = { storagePrefix: 'noa_', defaultTheme: 'dark' };

        const STATE = {
            config: {
                flowise_url: localStorage.getItem(CONFIG.storagePrefix + 'flowise_url') || '',
                chatflow_id: localStorage.getItem(CONFIG.storagePrefix + 'chatflow_id') || '',
                api_key: localStorage.getItem(CONFIG.storagePrefix + 'api_key') || ''
            },
            theme: localStorage.getItem(CONFIG.storagePrefix + 'theme') || CONFIG.defaultTheme,
            activeCapabilities: new Set(),
            selectedFile: null,
            isThinking: false,
            isStreaming: false,
            currentEmotion: localStorage.getItem('noa_emotion') || 'Feliz',
            currentEmoji: localStorage.getItem('noa_emoji') || '😊',
            diaryPin: '#e8559a',
            diaryFont: 'Inter'
        };

        // ============================================================================
        // DOM ELEMENTS
        // ============================================================================
        const DOM = {
            container: document.querySelector('.container'),
            orbCanvas: document.getElementById('orb-canvas'),
            statusLabel: document.getElementById('status-label'),
            statusDot: document.getElementById('status-dot'),
            messagesContainer: document.getElementById('messages-container'),
            messageInput: document.getElementById('message-input'),
            sendBtn: document.getElementById('send-btn'),
            configSheet: document.getElementById('config-sheet'),
            flowise_url: document.getElementById('flowise-url'),
            chatflow_id: document.getElementById('chatflow-id'),
            api_key: document.getElementById('api-key'),
            fileInput: document.getElementById('file-input'),
            imagePreviewBox: document.getElementById('image-preview-box'),
            previewImage: document.getElementById('preview-image'),
            capabilitiesChips: document.getElementById('capabilities-chips'),
            themeIcon: document.getElementById('theme-icon'),
            themeText: document.getElementById('theme-text')
        };

        // ============================================================================
        // INITIALIZATION
        // ============================================================================
        function init() {
            DOM.flowise_url.value = STATE.config.flowise_url;
            DOM.chatflow_id.value = STATE.config.chatflow_id;
            DOM.api_key.value = STATE.config.api_key;

            setTheme(STATE.theme);

            document.getElementById('emotion-emoji').textContent = STATE.currentEmoji;
            document.getElementById('emotion-text').textContent = STATE.currentEmotion;

            DOM.messageInput.addEventListener('input', handleInputResize);
            DOM.messageInput.addEventListener('keydown', handleInputKeydown);

            document.addEventListener('click', (e) => {
                const selector = document.getElementById('emotion-selector');
                if (!selector.contains(e.target)) {
                    document.getElementById('emotion-dropdown').classList.remove('show');
                }
                const noaDropdown = document.getElementById('noa-dropdown');
                if (!e.target.closest('.noa-menu-btn') && !noaDropdown.contains(e.target)) {
                    noaDropdown.classList.remove('show');
                }
            });

            checkConnection();
            setInterval(checkConnection, 10000);
            window.addEventListener('online', checkConnection);
            window.addEventListener('offline', checkConnection);

            // Add date separator on load
            addDateSeparator();

            // Load diary entries
            loadDiaryEntries();

            animateOrb();

            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./sw.js').catch(err => {
                        console.log('SW registration failed:', err);
                    });
                });
            }
        }

        // ============================================================================
        // DATE & TIME
        // ============================================================================
        function getSpanishDate() {
            const now = new Date();
            const options = { weekday: 'long', year: 'numeric', month: 'long', day: 'numeric' };
            return now.toLocaleDateString('es-ES', options);
        }

        function getTimeString() {
            const now = new Date();
            return now.toLocaleTimeString('es-ES', { hour: '2-digit', minute: '2-digit' });
        }

        function addDateSeparator() {
            const today = new Date().toDateString();
            const lastDate = localStorage.getItem(CONFIG.storagePrefix + 'last_chat_date');

            const separator = document.createElement('div');
            separator.className = 'date-separator';
            separator.innerHTML = `<span>${getSpanishDate()} • ${getTimeString()}</span>`;
            DOM.messagesContainer.appendChild(separator);

            localStorage.setItem(CONFIG.storagePrefix + 'last_chat_date', today);
        }

        // ============================================================================
        // ORB ANIMATION
        // ============================================================================
        let orbAnimationTime = 0;

        function animateOrb() {
            const canvas = DOM.orbCanvas;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;

            ctx.clearRect(0, 0, width, height);

            const t = orbAnimationTime * 0.001;
            const isDarkTheme = STATE.theme === 'dark';
            // Dark mode: pure white translucent moon. Light mode: stronger pink
            const ringColor = isDarkTheme ? '255, 255, 255' : '220, 50, 120';
            const coreColor = isDarkTheme ? '255, 255, 255' : '232, 60, 140';
            const glowColor = isDarkTheme ? '230, 235, 255' : '232, 85, 154';

            const glowGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 130);
            glowGradient.addColorStop(0, `rgba(${glowColor}, 0.35)`);
            glowGradient.addColorStop(0.4, `rgba(${glowColor}, 0.12)`);
            glowGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, 0, width, height);

            const numRings = 3;
            for (let ring = 0; ring < numRings; ring++) {
                ctx.beginPath();
                const baseRadius = 55 + ring * 14;
                const waveAmplitude = STATE.isThinking ? 12 : 5;

                for (let angle = 0; angle < Math.PI * 2; angle += 0.05) {
                    const waveOffset = Math.sin(angle * 3 + t * 2 + ring * Math.PI / 3) * waveAmplitude;
                    const radius = baseRadius + waveOffset;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    if (angle === 0) ctx.moveTo(x, y);
                    else ctx.lineTo(x, y);
                }

                ctx.closePath();
                const opacity = isDarkTheme ? (0.6 - ring * 0.15) : (0.7 - ring * 0.15);
                ctx.strokeStyle = `rgba(${ringColor}, ${opacity})`;
                ctx.lineWidth = isDarkTheme ? 1.5 : 2;
                ctx.stroke();
            }

            const coreGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 40);
            coreGradient.addColorStop(0, `rgba(${coreColor}, ${isDarkTheme ? 0.6 : 0.7})`);
            coreGradient.addColorStop(1, `rgba(${coreColor}, ${isDarkTheme ? 0.15 : 0.2})`);
            ctx.fillStyle = coreGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 40, 0, Math.PI * 2);
            ctx.fill();

            orbAnimationTime += 16;
            requestAnimationFrame(animateOrb);
        }

        // ============================================================================
        // THEME MANAGEMENT
        // ============================================================================
        function setTheme(theme) {
            STATE.theme = theme;
            localStorage.setItem(CONFIG.storagePrefix + 'theme', theme);

            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('theme-meta').content = '#f2ecf8';
                DOM.themeText.textContent = 'Modo Oscuro';
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.getElementById('theme-meta').content = '#0d0f1a';
                DOM.themeText.textContent = 'Modo Claro';
            }
        }

        function toggleTheme() {
            setTheme(STATE.theme === 'dark' ? 'light' : 'dark');
        }

        // ============================================================================
        // INPUT HANDLING
        // ============================================================================
        function handleInputResize() {
            const input = DOM.messageInput;
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
            DOM.sendBtn.disabled = !input.value.trim();
        }

        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!DOM.sendBtn.disabled) sendMessage();
            }
        }

        // ============================================================================
        // CAPABILITIES
        // ============================================================================
        function toggleCapabilities() {
            DOM.capabilitiesChips.classList.toggle('show');
        }

        function toggleCapability(button) {
            const capability = button.dataset.capability;
            button.classList.toggle('active');
            if (button.classList.contains('active')) {
                STATE.activeCapabilities.add(capability);
                if (capability === 'vision') DOM.fileInput.click();
            } else {
                STATE.activeCapabilities.delete(capability);
                if (capability === 'vision') clearImagePreview();
            }
        }

        function handleFileInput(event) {
            const file = event.target.files[0];
            if (!file) return;
            STATE.selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => { DOM.previewImage.src = e.target.result; DOM.imagePreviewBox.classList.add('show'); };
            reader.readAsDataURL(file);
        }

        function clearImagePreview() {
            STATE.selectedFile = null;
            DOM.imagePreviewBox.classList.remove('show');
            DOM.previewImage.src = '';
            DOM.fileInput.value = '';
            const visionChip = document.querySelector('[data-capability="vision"]');
            if (visionChip) { visionChip.classList.remove('active'); STATE.activeCapabilities.delete('vision'); }
        }

        // ============================================================================
        // CONFIG
        // ============================================================================
        function openConfig() {
            DOM.configSheet.classList.add('open');
        }

        function closeConfig() {
            DOM.configSheet.classList.remove('open');
            saveConfig();
        }

        function saveConfig() {
            STATE.config.flowise_url = DOM.flowise_url.value.trim();
            STATE.config.chatflow_id = DOM.chatflow_id.value.trim();
            STATE.config.api_key = DOM.api_key.value.trim();
            localStorage.setItem(CONFIG.storagePrefix + 'flowise_url', STATE.config.flowise_url);
            localStorage.setItem(CONFIG.storagePrefix + 'chatflow_id', STATE.config.chatflow_id);
            localStorage.setItem(CONFIG.storagePrefix + 'api_key', STATE.config.api_key);
        }

        function connectFlowise() {
            saveConfig();
            if (!STATE.config.flowise_url || !STATE.config.chatflow_id) {
                alert('Por favor ingresa la URL de Flowise y el Chatflow ID');
                return;
            }
            closeConfig();
            checkConnection();
            addMessage('Conectado a Flowise. ¡Listo para chatear! 💬', 'assistant');
        }

        function clearChat() {
            DOM.messagesContainer.innerHTML = '';
            addDateSeparator();
            closeConfig();
        }

        // ============================================================================
        // NOA MENU
        // ============================================================================
        function toggleNoaMenu() {
            document.getElementById('noa-dropdown').classList.toggle('show');
        }

        function openNoaMenuItem(item) {
            document.getElementById('noa-dropdown').classList.remove('show');
            switch(item) {
                case 'mem0':
                    addMessage('🧠 Mem0: Conector en desarrollo. Próximamente podrás conectar tu memoria.', 'assistant');
                    break;
                case 'substack':
                    addMessage('📝 Substack: Conector en desarrollo. Próximamente podrás publicar desde aquí.', 'assistant');
                    break;
                case 'diary':
                    openDiary();
                    break;
                case 'lovense':
                    addMessage('💜 Lovense: Conector en desarrollo. Próximamente disponible.', 'assistant');
                    break;
            }
        }

        // ============================================================================
        // DIARY
        // ============================================================================
        function openDiary() {
            document.getElementById('diary-sheet').classList.add('open');
        }

        function closeDiary() {
            document.getElementById('diary-sheet').classList.remove('open');
        }

        function setDiaryFont(font) {
            STATE.diaryFont = font;
            document.getElementById('diary-input').style.fontFamily = font;
            document.querySelectorAll('.diary-toolbar button').forEach(b => b.classList.remove('active'));
            if (font.includes('Inter')) document.getElementById('font-inter').classList.add('active');
            else if (font.includes('Georgia')) document.getElementById('font-serif').classList.add('active');
            else document.getElementById('font-mono').classList.add('active');
        }

        function setDiaryPin(color) {
            STATE.diaryPin = color;
            document.querySelectorAll('.pin-dot').forEach(d => d.classList.remove('active'));
            event.target.classList.add('active');
        }

        function saveDiaryEntry() {
            const input = document.getElementById('diary-input');
            const text = input.value.trim();
            if (!text) return;

            const entries = JSON.parse(localStorage.getItem(CONFIG.storagePrefix + 'diary') || '[]');
            const entry = {
                id: Date.now(),
                text: text,
                date: new Date().toLocaleString('es-ES'),
                pin: STATE.diaryPin,
                font: STATE.diaryFont
            };
            entries.unshift(entry);
            localStorage.setItem(CONFIG.storagePrefix + 'diary', JSON.stringify(entries));

            input.value = '';
            loadDiaryEntries();
        }

        function loadDiaryEntries() {
            const container = document.getElementById('diary-entries');
            const entries = JSON.parse(localStorage.getItem(CONFIG.storagePrefix + 'diary') || '[]');

            container.innerHTML = entries.map(entry => `
                <div class="diary-entry" style="font-family: ${entry.font}; border-left-color: ${entry.pin}">
                    <div class="diary-entry-pin" style="background: ${entry.pin}"></div>
                    <div class="diary-entry-date">${entry.date}</div>
                    <div class="diary-entry-text">${entry.text}</div>
                </div>
            `).join('');
        }

        function exportDiary() {
            const entries = JSON.parse(localStorage.getItem(CONFIG.storagePrefix + 'diary') || '[]');
            if (entries.length === 0) { alert('No hay entradas para exportar.'); return; }
            let content = '📖 Diario de Noa\n' + '='.repeat(30) + '\n\n';
            entries.forEach(entry => {
                content += `[${entry.date}]\n${entry.text}\n\n---\n\n`;
            });
            const blob = new Blob([content], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `diario-noa-${new Date().toISOString().slice(0,10)}.txt`;
            a.click();
            URL.revokeObjectURL(url);
        }

        // ============================================================================
        // EMOTION & CONNECTION
        // ============================================================================
        function toggleEmotionDropdown() {
            document.getElementById('emotion-dropdown').classList.toggle('show');
        }

        function selectEmotion(event, emoji, text) {
            event.stopPropagation();
            STATE.currentEmoji = emoji;
            STATE.currentEmotion = text;
            document.getElementById('emotion-emoji').textContent = emoji;
            document.getElementById('emotion-text').textContent = text;
            document.getElementById('emotion-dropdown').classList.remove('show');
            localStorage.setItem('noa_emoji', emoji);
            localStorage.setItem('noa_emotion', text);
        }

        function checkConnection() {
            const badge = document.getElementById('connection-badge');
            const text = document.getElementById('connection-text');

            if (!navigator.onLine) {
                badge.className = 'connection-badge offline';
                text.textContent = 'Sin conexión';
                return;
            }

            if (STATE.config.flowise_url) {
                const startTime = Date.now();
                fetch(STATE.config.flowise_url, { method: 'HEAD', mode: 'no-cors', cache: 'no-cache' })
                    .then(() => {
                        const latency = Date.now() - startTime;
                        if (latency > 3000) {
                            badge.className = 'connection-badge unstable';
                            text.textContent = 'Inestable';
                        } else {
                            badge.className = 'connection-badge online';
                            text.textContent = 'Conectado';
                        }
                    })
                    .catch(() => {
                        badge.className = 'connection-badge unstable';
                        text.textContent = 'Inestable';
                    });
            } else {
                badge.className = 'connection-badge online';
                text.textContent = 'Conectado';
            }
        }

        // ============================================================================
        // NOTIFICATIONS
        // ============================================================================
        function requestNotificationPermission() {
            // Check if running as installed PWA on iOS
            const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
            const isIOS = /iPhone|iPad|iPod/.test(navigator.userAgent);
            
            if ('Notification' in window) {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        addMessage('🔔 Notificaciones activadas. Noa te enviará mensajes.', 'assistant');
                        showLocalNotification('¡Hola!', 'Las notificaciones de Noa están activas 💕');
                    } else if (permission === 'denied') {
                        addMessage('Las notificaciones fueron denegadas. Puedes activarlas desde Ajustes > Safari > Notificaciones.', 'assistant');
                    } else {
                        addMessage('No se pudo determinar el permiso. Intenta de nuevo.', 'assistant');
                    }
                }).catch(() => {
                    addMessage('Hubo un error al solicitar permisos de notificación.', 'assistant');
                });
            } else if (isIOS && !isStandalone) {
                addMessage('📱 Para recibir notificaciones en iPhone, necesitas instalar esta app: toca Compartir (↑) > "Añadir a pantalla de inicio". Luego ábrela desde ahí y activa notificaciones.', 'assistant');
            } else if (isIOS) {
                addMessage('📱 Las notificaciones push requieren iOS 16.4 o superior. Verifica que tu iPhone esté actualizado en Ajustes > General > Actualización de software.', 'assistant');
            } else {
                addMessage('Tu navegador no soporta notificaciones. Intenta usar Chrome o Safari actualizado.', 'assistant');
            }
        }

        function showLocalNotification(title, body) {
            if (Notification.permission === 'granted') {
                new Notification(title, {
                    body: body,
                    icon: 'data:image/svg+xml,<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 192 192"><circle cx="96" cy="96" r="90" fill="%23e8559a"/></svg>',
                    tag: 'noa-msg'
                });
            }
        }

        // ============================================================================
        // MESSAGING
        // ============================================================================
        function addMessage(text, role, isImage = false) {
            const wrapper = document.createElement('div');
            wrapper.className = `message-wrapper ${role}`;

            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}`;

            if (isImage) {
                messageEl.classList.add('image-preview');
                const img = document.createElement('img');
                img.src = text;
                messageEl.appendChild(img);
            } else {
                messageEl.textContent = text;
            }

            const timeEl = document.createElement('div');
            timeEl.className = 'message-time';
            timeEl.textContent = getTimeString();

            wrapper.appendChild(messageEl);
            wrapper.appendChild(timeEl);
            DOM.messagesContainer.appendChild(wrapper);
            scrollToBottom();
            return messageEl;
        }

        function addTypingIndicator() {
            const wrapper = document.createElement('div');
            wrapper.id = 'typing-indicator';
            const label = document.createElement('div');
            label.className = 'typing-label';
            label.textContent = 'Noa está escribiendo...';
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            wrapper.appendChild(label);
            wrapper.appendChild(indicator);
            DOM.messagesContainer.appendChild(wrapper);
            scrollToBottom();
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) indicator.remove();
        }

        function scrollToBottom() {
            DOM.messagesContainer.scrollTop = DOM.messagesContainer.scrollHeight;
        }

        function setThinkingState(isThinking) {
            STATE.isThinking = isThinking;
            const orbWrapper = document.querySelector('.orb-wrapper');
            const orbStage = document.querySelector('.orb-stage');
            if (isThinking) {
                DOM.statusDot.classList.add('pulse');
                DOM.statusLabel.classList.add('active');
                orbWrapper.classList.add('thinking');
                orbStage.classList.add('thinking-glow');
            } else {
                DOM.statusDot.classList.remove('pulse');
                DOM.statusLabel.classList.remove('active');
                orbWrapper.classList.remove('thinking');
                orbStage.classList.remove('thinking-glow');
            }
        }

        async function sendMessage() {
            const message = DOM.messageInput.value.trim();
            if (!message || !STATE.config.flowise_url || !STATE.config.chatflow_id) {
                if (!STATE.config.flowise_url || !STATE.config.chatflow_id) {
                    addMessage('Por favor configura la URL de Flowise y el Chatflow ID en ajustes.', 'assistant');
                    openConfig();
                }
                return;
            }

            DOM.messageInput.value = '';
            handleInputResize();
            addMessage(message, 'user');

            if (STATE.selectedFile) {
                const reader = new FileReader();
                reader.onload = (e) => addMessage(e.target.result, 'user', true);
                reader.readAsDataURL(STATE.selectedFile);
            }

            setThinkingState(true);
            addTypingIndicator();

            try {
                const body = { question: message };
                // Send mood as context to Flowise
                if (STATE.currentEmotion) {
                    body.overrideConfig = {
                        systemMessagePrompt: `[Estado emocional actual de Noa: ${STATE.currentEmoji} ${STATE.currentEmotion}]`
                    };
                }
                if (STATE.activeCapabilities.size > 0) body.capabilities = Array.from(STATE.activeCapabilities);

                if (STATE.selectedFile && STATE.activeCapabilities.has('vision')) {
                    const base64 = await fileToBase64(STATE.selectedFile);
                    body.uploads = [{ data: base64, type: 'file', name: STATE.selectedFile.name, mime: STATE.selectedFile.type }];
                }

                const headers = { 'Content-Type': 'application/json' };
                if (STATE.config.api_key) headers['Authorization'] = `Bearer ${STATE.config.api_key}`;

                const response = await fetch(
                    `${STATE.config.flowise_url}/api/v1/prediction/${STATE.config.chatflow_id}`,
                    { method: 'POST', headers: headers, body: JSON.stringify(body) }
                );

                if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);

                removeTypingIndicator();

                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('text/event-stream')) {
                    await handleStreamingResponse(response);
                } else {
                    const data = await response.json();
                    const responseText = data.text || data.answer || JSON.stringify(data);
                    addMessage(responseText, 'assistant');
                }

                clearImagePreview();
                // Play subtle notification sound
                playMessageSound();
            } catch (error) {
                removeTypingIndicator();
                console.error('Error:', error);
                addMessage(`Error: ${error.message}`, 'assistant');
            } finally {
                setThinkingState(false);
            }
        }

        async function handleStreamingResponse(response) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullResponse = '';
            let messageEl = null;

            STATE.isStreaming = true;
            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;
                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');
                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.text) {
                                    fullResponse += data.text;
                                    if (!messageEl) messageEl = addMessage(fullResponse, 'assistant');
                                    else messageEl.textContent = fullResponse;
                                    scrollToBottom();
                                }
                            } catch (e) {}
                        }
                    }
                }
            } finally {
                STATE.isStreaming = false;
                if (!messageEl && fullResponse) addMessage(fullResponse, 'assistant');
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = (error) => reject(error);
            });
        }

        // ============================================================================
        // MESSAGE SOUND (Web Audio API)
        // ============================================================================
        let audioCtx = null;
        function playMessageSound() {
            try {
                if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                osc.frequency.exponentialRampToValueAtTime(440, audioCtx.currentTime + 0.15);
                gain.gain.setValueAtTime(0.08, audioCtx.currentTime);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3);
                osc.start(audioCtx.currentTime);
                osc.stop(audioCtx.currentTime + 0.3);
            } catch(e) {}
        }

        // ============================================================================
        // MOBILE KEYBOARD FIX (page stays completely still)
        // ============================================================================
        (function() {
            const container = document.querySelector('.container');
            
            // Use position:fixed on body to prevent ANY page movement
            // The body is already position:fixed, so iOS cannot scroll it
            
            if (window.visualViewport) {
                const onViewportChange = () => {
                    // Set body and container height to the visual viewport
                    const h = window.visualViewport.height;
                    document.body.style.height = h + 'px';
                    container.style.height = h + 'px';
                    
                    // Detect keyboard
                    const keyboardOpen = h < window.screen.height * 0.75;
                    if (keyboardOpen) {
                        container.classList.add('keyboard-open');
                    } else {
                        container.classList.remove('keyboard-open');
                    }
                    
                    // Counteract any viewport offset iOS applies
                    const offsetTop = window.visualViewport.offsetTop;
                    if (offsetTop > 0) {
                        document.body.style.transform = `translateY(-${offsetTop}px)`;
                    } else {
                        document.body.style.transform = '';
                    }
                    
                    setTimeout(scrollToBottom, 30);
                };
                
                window.visualViewport.addEventListener('resize', onViewportChange);
                window.visualViewport.addEventListener('scroll', onViewportChange);
            }
            
            DOM.messageInput.addEventListener('focus', () => {
                setTimeout(scrollToBottom, 300);
            });
            
            // Prevent any body/document scrolling
            document.addEventListener('touchmove', (e) => {
                if (!e.target.closest('.messages-container, .diary-content, .sheet-content')) {
                    e.preventDefault();
                }
            }, { passive: false });
            
            // Also prevent scroll on window
            window.addEventListener('scroll', () => {
                window.scrollTo(0, 0);
            });
        })();

        // ============================================================================
        // STARTUP
        // ============================================================================
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
