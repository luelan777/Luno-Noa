<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#0d0f1a" id="theme-meta">
    <meta name="description" content="Noa - AI Chatbot powered by Flowise">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Noa">
    <meta name="mobile-web-app-capable" content="yes">
    <title>Noa</title>
    <link rel="manifest" href="./manifest.json">
    <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><circle cx='90' cy='90' r='85' fill='%23e8559a'/></svg>">
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><circle cx='90' cy='90' r='85' fill='%23e8559a'/></svg>">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg: #0d0f1a;
            --surface: rgba(13, 15, 28, 0.92);
            --surface2: rgba(18, 20, 38, 0.95);
            --border: rgba(200, 150, 220, 0.12);
            --border-hi: rgba(232, 85, 154, 0.28);
            --text: #ede8f5;
            --text-muted: #9080b0;
            --text-faint: #3a3060;
            --input-bg: rgba(15, 12, 32, 0.92);
            --pink: #e8559a;
            --pink-soft: #f0a0c8;
            --pink-glow: rgba(232, 85, 154, 0.25);
            --font: "Inter", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            --ease: cubic-bezier(0.16, 1, 0.3, 1);
        }

        [data-theme="light"] {
            --bg: #f2ecf8;
            --surface: rgba(242, 236, 250, 0.92);
            --surface2: rgba(235, 228, 248, 0.96);
            --border: rgba(180, 120, 200, 0.14);
            --border-hi: rgba(204, 68, 136, 0.28);
            --text: #2a1a38;
            --text-muted: #7a5090;
            --text-faint: #c0a8d0;
            --input-bg: rgba(248, 242, 255, 0.96);
            --pink: #cc4488;
            --pink-soft: #e890bc;
            --pink-glow: rgba(204, 68, 136, 0.18);
            --theme-meta: #f2ecf8;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        *::before,
        *::after {
            box-sizing: border-box;
        }

        html {
            height: 100%;
            -webkit-text-size-adjust: 100%;
            -webkit-user-select: none;
            user-select: none;
        }

        body {
            height: 100dvh;
            font-family: var(--font);
            color: var(--text);
            overflow: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: var(--bg);
            transition: background 600ms var(--ease), color 400ms var(--ease);
            position: fixed;
            width: 100%;
            top: 0;
            left: 0;
        }

        button {
            cursor: pointer;
            background: none;
            border: none;
            font: inherit;
            color: inherit;
            -webkit-user-select: none;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        textarea {
            font: inherit;
            color: inherit;
            -webkit-user-select: text;
            user-select: text;
        }

        input {
            font: inherit;
            color: inherit;
            -webkit-user-select: text;
            user-select: text;
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation-duration: 0.01ms !important;
                transition-duration: 0.01ms !important;
            }
        }

        /* Main Container */
        .container {
            width: 100%;
            max-width: 500px;
            height: 100dvh;
            display: flex;
            flex-direction: column;
            background: var(--bg);
            position: relative;
            z-index: 1;
        }

        /* Orb Stage */
        .orb-stage {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 16px;
            padding: 24px 16px;
            pointer-events: none;
            position: relative;
        }

        .orb-wrapper {
            position: relative;
            width: 280px;
            height: 280px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        #orb-canvas {
            display: block;
            width: 100%;
            height: 100%;
            filter: drop-shadow(0 0 20px var(--pink-glow));
        }

        .status-label {
            font-size: 0.72rem;
            font-weight: 400;
            letter-spacing: 0.3em;
            text-transform: uppercase;
            color: var(--text-faint);
            display: flex;
            align-items: center;
            gap: 8px;
            transition: color 400ms var(--ease);
        }

        .status-label.active {
            color: var(--pink);
        }

        .status-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: currentColor;
        }

        .status-dot.pulse {
            animation: pulse 1.2s ease-in-out infinite;
        }

        @keyframes pulse {
            0%, 100% {
                opacity: 1;
                transform: scale(1);
            }
            50% {
                opacity: 0.5;
                transform: scale(0.8);
            }
        }

        /* Chat Panel */
        .chat-panel {
            flex: 0 0 auto;
            display: flex;
            flex-direction: column;
            height: 44dvh;
            background: linear-gradient(to top, var(--surface) 80%, transparent);
            backdrop-filter: blur(16px);
            -webkit-backdrop-filter: blur(16px);
            border-top: 1px solid var(--border);
            padding: 12px 16px max(16px, env(safe-area-inset-bottom));
            gap: 12px;
            transition: background 600ms var(--ease);
            overflow: hidden;
            z-index: 10;
        }

        .messages-container {
            flex: 1;
            overflow-y: auto;
            display: flex;
            flex-direction: column;
            gap: 10px;
            padding-right: 4px;
            scrollbar-width: thin;
            scrollbar-color: var(--border) transparent;
            mask-image: linear-gradient(to bottom, black 0%, black 85%, transparent 100%);
            -webkit-mask-image: linear-gradient(to bottom, black 0%, black 85%, transparent 100%);
        }

        .messages-container::-webkit-scrollbar {
            width: 4px;
        }

        .messages-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .messages-container::-webkit-scrollbar-thumb {
            background: var(--border);
            border-radius: 2px;
        }

        .message {
            max-width: 85%;
            padding: 10px 14px;
            border-radius: 16px;
            font-size: 0.9rem;
            line-height: 1.5;
            word-wrap: break-word;
            animation: slideIn 280ms var(--ease);
        }

        .message.user {
            align-self: flex-end;
            background: rgba(232, 85, 154, 0.14);
            border: 1px solid rgba(232, 85, 154, 0.28);
            border-bottom-right-radius: 4px;
            color: var(--text);
        }

        [data-theme="light"] .message.user {
            background: rgba(204, 68, 136, 0.09);
            border-color: rgba(204, 68, 136, 0.18);
        }

        .message.assistant {
            align-self: flex-start;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            color: var(--text);
        }

        .message.image-preview {
            max-width: 100%;
            padding: 6px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
        }

        .message.image-preview img {
            max-width: 160px;
            max-height: 130px;
            border-radius: 8px;
            display: block;
        }

        .typing-indicator {
            display: flex;
            gap: 4px;
            align-self: flex-start;
            padding: 10px 14px;
        }

        .typing-dot {
            width: 6px;
            height: 6px;
            border-radius: 50%;
            background: var(--text-faint);
            animation: typing 1.2s ease-in-out infinite;
        }

        .typing-dot:nth-child(2) {
            animation-delay: 0.2s;
        }

        .typing-dot:nth-child(3) {
            animation-delay: 0.4s;
        }

        @keyframes typing {
            0%, 100% {
                transform: translateY(0);
                opacity: 0.4;
            }
            50% {
                transform: translateY(-6px);
                opacity: 1;
            }
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(8px) scale(0.98);
            }
            to {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }

        /* Toolbar */
        .toolbar {
            display: flex;
            flex-direction: column;
            gap: 8px;
            flex-shrink: 0;
        }

        .image-preview-box {
            display: none;
            align-items: center;
            gap: 8px;
            padding: 8px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            animation: slideIn 200ms var(--ease);
        }

        .image-preview-box.show {
            display: flex;
        }

        .image-preview-box img {
            width: 36px;
            height: 36px;
            border-radius: 6px;
            object-fit: cover;
        }

        .image-preview-box button {
            margin-left: auto;
            padding: 4px;
            color: var(--pink);
            font-size: 1.2rem;
            line-height: 1;
        }

        .capabilities-chips {
            display: flex;
            gap: 8px;
            overflow-x: auto;
            scrollbar-width: none;
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transition: max-height 320ms var(--ease), opacity 260ms var(--ease);
            padding-right: 4px;
        }

        .capabilities-chips::-webkit-scrollbar {
            display: none;
        }

        .capabilities-chips.show {
            max-height: 44px;
            opacity: 1;
        }

        .chip {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            padding: 7px 14px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface2);
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            flex-shrink: 0;
            transition: all 160ms var(--ease);
            pointer-events: auto;
        }

        .chip:hover {
            border-color: var(--border-hi);
            color: var(--pink);
            transform: translateY(-1px);
        }

        .chip.active {
            border-color: var(--pink);
            color: var(--pink);
            background: rgba(232, 85, 154, 0.08);
        }

        [data-theme="light"] .chip.active {
            background: rgba(204, 68, 136, 0.08);
        }

        .chip svg {
            width: 12px;
            height: 12px;
        }

        /* Input Area */
        .input-area {
            display: flex;
            align-items: flex-end;
            gap: 8px;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 24px;
            padding: 8px 8px 8px 14px;
            transition: border-color 200ms var(--ease), box-shadow 200ms var(--ease);
            flex-shrink: 0;
        }

        .input-area:focus-within {
            border-color: var(--border-hi);
            box-shadow: 0 0 0 3px var(--pink-glow);
        }

        #message-input {
            flex: 1;
            background: none;
            border: none;
            outline: none;
            padding: 10px 0;
            min-height: 40px;
            max-height: 120px;
            resize: none;
            font-size: 0.95rem;
            line-height: 1.4;
            color: var(--text);
        }

        #message-input::placeholder {
            color: var(--text-faint);
        }

        .input-actions {
            display: flex;
            align-items: center;
            gap: 4px;
            padding-bottom: 2px;
            flex-shrink: 0;
        }

        .btn-icon {
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 50%;
            color: var(--text-muted);
            transition: all 200ms var(--ease);
            flex-shrink: 0;
            pointer-events: auto;
        }

        .btn-icon:hover {
            background: var(--surface2);
            color: var(--pink);
        }

        .btn-icon svg {
            width: 20px;
            height: 20px;
        }

        .btn-icon:active {
            transform: scale(0.95);
        }

        .btn-send {
            background: var(--pink);
            color: white;
            width: 36px;
            height: 36px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 200ms var(--ease);
            flex-shrink: 0;
            pointer-events: auto;
        }

        .btn-send:hover:not(:disabled) {
            transform: scale(1.08);
            box-shadow: 0 4px 12px var(--pink-glow);
        }

        .btn-send:active:not(:disabled) {
            transform: scale(0.95);
        }

        .btn-send:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        .btn-send svg {
            width: 18px;
            height: 18px;
            stroke-width: 2.5;
        }

        /* Config Sheet */
        .config-sheet {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            visibility: hidden;
            pointer-events: none;
            transition: visibility 400ms var(--ease);
            display: flex;
            align-items: flex-end;
        }

        .config-sheet.open {
            visibility: visible;
            pointer-events: auto;
        }

        .sheet-overlay {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            -webkit-backdrop-filter: blur(4px);
            opacity: 0;
            transition: opacity 400ms var(--ease);
        }

        .config-sheet.open .sheet-overlay {
            opacity: 1;
        }

        .sheet-content {
            position: relative;
            width: 100%;
            max-width: 500px;
            background: var(--surface2);
            border-top: 1px solid var(--border);
            border-radius: 24px 24px 0 0;
            padding: 24px 20px max(24px, env(safe-area-inset-bottom));
            transform: translateY(100%);
            transition: transform 400ms var(--ease);
            max-height: 90dvh;
            overflow-y: auto;
            scrollbar-width: thin;
        }

        .config-sheet.open .sheet-content {
            transform: translateY(0);
        }

        .sheet-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            gap: 12px;
        }

        .sheet-header h2 {
            font-size: 1.1rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .sheet-header .btn-icon {
            margin-right: -8px;
        }

        .config-field {
            margin-bottom: 16px;
        }

        .config-field label {
            display: block;
            font-size: 0.72rem;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            color: var(--text-muted);
            margin-bottom: 8px;
            font-weight: 500;
        }

        .config-field input {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 12px 14px;
            color: var(--text);
            font-size: 0.9rem;
            outline: none;
            transition: border-color 200ms var(--ease);
        }

        .config-field input:focus {
            border-color: var(--pink);
        }

        .config-field input::placeholder {
            color: var(--text-faint);
        }

        .config-actions {
            display: flex;
            flex-direction: column;
            gap: 12px;
            padding-top: 12px;
            border-top: 1px solid var(--border);
            margin-top: 16px;
        }

        .config-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px 16px;
            border-radius: 12px;
            border: 1px solid var(--border);
            background: var(--surface);
            color: var(--text);
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 200ms var(--ease);
            cursor: pointer;
        }

        .config-btn:hover {
            border-color: var(--border-hi);
            background: var(--surface2);
            color: var(--pink);
        }

        .config-btn svg {
            width: 16px;
            height: 16px;
        }

        /* Status Bar (emotion + connection) */
        .status-bar {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 6px 16px;
            flex-shrink: 0;
        }

        .emotion-selector {
            position: relative;
            display: flex;
            align-items: center;
            gap: 6px;
            padding: 5px 12px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface2);
            cursor: pointer;
            transition: all 200ms var(--ease);
            font-size: 0.8rem;
            color: var(--text-muted);
        }

        .emotion-selector:hover {
            border-color: var(--border-hi);
        }

        .emotion-emoji {
            font-size: 1rem;
            line-height: 1;
        }

        .emotion-text {
            font-size: 0.75rem;
            font-weight: 500;
            letter-spacing: 0.02em;
        }

        .emotion-dropdown {
            position: absolute;
            top: calc(100% + 6px);
            left: 50%;
            transform: translateX(-50%) scale(0.95);
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 14px;
            padding: 8px;
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            opacity: 0;
            visibility: hidden;
            transition: all 200ms var(--ease);
            z-index: 100;
            box-shadow: 0 8px 24px rgba(0,0,0,0.3);
            min-width: 180px;
        }

        .emotion-dropdown.show {
            opacity: 1;
            visibility: visible;
            transform: translateX(-50%) scale(1);
        }

        .emotion-option {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 8px 4px;
            border-radius: 10px;
            cursor: pointer;
            transition: all 150ms var(--ease);
            border: none;
            background: none;
        }

        .emotion-option:hover {
            background: var(--pink-glow);
        }

        .emotion-option .emoji {
            font-size: 1.2rem;
        }

        .emotion-option .label {
            font-size: 0.6rem;
            color: var(--text-faint);
            white-space: nowrap;
        }

        .connection-badge {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 999px;
            border: 1px solid var(--border);
            background: var(--surface2);
            font-size: 0.7rem;
            font-weight: 500;
            letter-spacing: 0.02em;
            transition: all 300ms var(--ease);
        }

        .connection-dot {
            width: 7px;
            height: 7px;
            border-radius: 50%;
            transition: background 300ms var(--ease);
        }

        .connection-badge.online .connection-dot {
            background: #22c55e;
            box-shadow: 0 0 6px rgba(34, 197, 94, 0.5);
        }

        .connection-badge.online {
            color: #22c55e;
            border-color: rgba(34, 197, 94, 0.25);
        }

        .connection-badge.unstable .connection-dot {
            background: #f59e0b;
            box-shadow: 0 0 6px rgba(245, 158, 11, 0.5);
        }

        .connection-badge.unstable {
            color: #f59e0b;
            border-color: rgba(245, 158, 11, 0.25);
        }

        .connection-badge.offline .connection-dot {
            background: #ef4444;
            box-shadow: 0 0 6px rgba(239, 68, 68, 0.5);
        }

        .connection-badge.offline {
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.25);
        }

        /* Top Bar */
        .top-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 16px;
            padding-top: max(12px, env(safe-area-inset-top));
            flex-shrink: 0;
            z-index: 20;
        }

        .top-bar-title {
            font-size: 1rem;
            font-weight: 600;
            letter-spacing: 0.04em;
            color: var(--text);
        }

        .top-bar-actions {
            display: flex;
            gap: 4px;
            align-items: center;
        }

        /* Hidden Elements */
        #file-input {
            display: none;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .container {
                max-width: 100%;
            }

            .orb-stage {
                padding: 16px 12px;
                gap: 12px;
            }

            .orb-wrapper {
                width: 240px;
                height: 240px;
            }

            .message {
                font-size: 0.85rem;
            }

            .chat-panel {
                height: 50dvh;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Top Bar -->
        <div class="top-bar">
            <span class="top-bar-title">Noa</span>
            <div class="top-bar-actions">
                <button class="btn-icon" onclick="toggleTheme()" title="Toggle theme">
                    <svg id="theme-toggle-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
                    </svg>
                </button>
                <button class="btn-icon" onclick="openConfig()" title="Settings">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <circle cx="12" cy="12" r="3"/>

    <!-- Config Sheet -->
    <div class="config-sheet" id="config-sheet">
        <div class="sheet-overlay" onclick="closeConfig()"></div>
        <div class="sheet-content">
            <div class="sheet-header">
                <h2>Configuration</h2>
                <button class="btn-icon" onclick="closeConfig()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <line x1="18" y1="6" x2="6" y2="18"/>
                        <line x1="6" y1="6" x2="18" y2="18"/>

            <div class="config-field">
                <label for="flowise-url">Flowise URL</label>
                <input type="text" id="flowise-url" placeholder="https://your-flowise-instance.com">
            </div>

            <div class="config-field">
                <label for="chatflow-id">Chatflow ID</label>
                <input type="text" id="chatflow-id" placeholder="Your chatflow UUID">

            <div class="config-field">
                <label for="api-key">API Key (Optional)</label>
                <input type="password" id="api-key" placeholder="Your API key">

            <div class="config-actions">
                <button class="config-btn" onclick="toggleTheme()">
                    <svg id="theme-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">

                    </svg>

                <button class="config-btn" onclick="clearChat()">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="3 6 5 6 21 6"/>
                        <path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"/>
                        <line x1="10" y1="11" x2="10" y2="17"/>
                        <line x1="14" y1="11" x2="14" y2="17"/>

                    <span>Clear Chat</span>
                </button>
            </div>
        </div>
    </div>

    <!-- Hidden Input -->
    <input type="file" id="file-input" accept="image/*" onchange="handleFileInput(event)">

    <script>
        // ============================================================================
        // CONFIGURATION & STATE
        // ============================================================================

        const CONFIG = {
            storagePrefix: 'noa_',
            defaultTheme: 'dark'
        };

        const STATE = {
            config: {
                flowise_url: localStorage.getItem(CONFIG.storagePrefix + 'flowise_url') || '',
                chatflow_id: localStorage.getItem(CONFIG.storagePrefix + 'chatflow_id') || '',
                api_key: localStorage.getItem(CONFIG.storagePrefix + 'api_key') || ''
            },
            theme: localStorage.getItem(CONFIG.storagePrefix + 'theme') || CONFIG.defaultTheme,
            activeCapabilities: new Set(),
            selectedFile: null,
            isThinking: false,
            isStreaming: false,
            currentEmotion: localStorage.getItem('noa_emotion') || 'Feliz',
            currentEmoji: localStorage.getItem('noa_emoji') || '😊'
        };

        // ============================================================================
        // DOM ELEMENTS
        // ============================================================================

        const DOM = {
            container: document.querySelector('.container'),
            orbCanvas: document.getElementById('orb-canvas'),
            statusLabel: document.getElementById('status-label'),
            statusDot: document.getElementById('status-dot'),
            messagesContainer: document.getElementById('messages-container'),
            messageInput: document.getElementById('message-input'),
            sendBtn: document.getElementById('send-btn'),
            configSheet: document.getElementById('config-sheet'),
            flowise_url: document.getElementById('flowise-url'),
            chatflow_id: document.getElementById('chatflow-id'),
            api_key: document.getElementById('api-key'),
            fileInput: document.getElementById('file-input'),
            imagePreviewBox: document.getElementById('image-preview-box'),
            previewImage: document.getElementById('preview-image'),
            capabilitiesChips: document.getElementById('capabilities-chips'),
            themeIcon: document.getElementById('theme-icon'),
            themeText: document.getElementById('theme-text')
        };

        // ============================================================================
        // INITIALIZATION
        // ============================================================================

        function init() {
            // Load configuration
            DOM.flowise_url.value = STATE.config.flowise_url;
            DOM.chatflow_id.value = STATE.config.chatflow_id;
            DOM.api_key.value = STATE.config.api_key;

            // Set theme
            setTheme(STATE.theme);

            // Set emotion
            document.getElementById('emotion-emoji').textContent = STATE.currentEmoji;
            document.getElementById('emotion-text').textContent = STATE.currentEmotion;

            // Setup event listeners
            DOM.messageInput.addEventListener('input', handleInputResize);
            DOM.messageInput.addEventListener('keydown', handleInputKeydown);
            DOM.configSheet.addEventListener('click', handleSheetOverlayClick);

            // Close emotion dropdown when clicking outside
            document.addEventListener('click', (e) => {
                const selector = document.getElementById('emotion-selector');
                if (!selector.contains(e.target)) {
                    document.getElementById('emotion-dropdown').classList.remove('show');
                }
            });

            // Start connection monitoring
            checkConnection();
            setInterval(checkConnection, 10000);
            window.addEventListener('online', checkConnection);
            window.addEventListener('offline', checkConnection);

            // Start orb animation
            animateOrb();

            // Register service worker
            if ('serviceWorker' in navigator) {
                window.addEventListener('load', () => {
                    navigator.serviceWorker.register('./sw.js').catch(err => {
                        console.log('Service Worker registration failed:', err);
                    });
                });
            }
        }

        // ============================================================================
        // ORB ANIMATION
        // ============================================================================

        let orbAnimationTime = 0;

        function animateOrb() {
            const canvas = DOM.orbCanvas;
            const ctx = canvas.getContext('2d');
            const width = canvas.width;
            const height = canvas.height;
            const centerX = width / 2;
            const centerY = height / 2;

            ctx.clearRect(0, 0, width, height);

            const t = orbAnimationTime * 0.001;
            const isDarkTheme = STATE.theme === 'dark';
            const pinkColor = isDarkTheme ? '232, 85, 154' : '204, 68, 136';

            // Background glow
            const glowGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 140);
            glowGradient.addColorStop(0, `rgba(${pinkColor}, 0.2)`);
            glowGradient.addColorStop(0.5, `rgba(${pinkColor}, 0.05)`);
            glowGradient.addColorStop(1, 'rgba(0, 0, 0, 0)');
            ctx.fillStyle = glowGradient;
            ctx.fillRect(0, 0, width, height);

            // Animated rings
            const numRings = 3;
            for (let ring = 0; ring < numRings; ring++) {
                ctx.beginPath();
                const baseRadius = 70 + ring * 15;
                const waveAmplitude = STATE.isThinking ? 12 : 5;
                const waveFrequency = 0.1;

                for (let angle = 0; angle < Math.PI * 2; angle += 0.05) {
                    const waveOffset = Math.sin(angle * 3 + t * 2 + ring * Math.PI / 3) * waveAmplitude;
                    const radius = baseRadius + waveOffset;
                    const x = centerX + Math.cos(angle) * radius;
                    const y = centerY + Math.sin(angle) * radius;

                    if (angle === 0) {
                        ctx.moveTo(x, y);
                    } else {
                        ctx.lineTo(x, y);
                    }
                }

                ctx.closePath();
                const opacity = 0.5 - ring * 0.12;
                ctx.strokeStyle = `rgba(${pinkColor}, ${opacity})`;
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            // Core circle
            const coreGradient = ctx.createRadialGradient(centerX, centerY, 0, centerX, centerY, 50);
            coreGradient.addColorStop(0, `rgba(${pinkColor}, 0.4)`);
            coreGradient.addColorStop(1, `rgba(${pinkColor}, 0.1)`);
            ctx.fillStyle = coreGradient;
            ctx.beginPath();
            ctx.arc(centerX, centerY, 50, 0, Math.PI * 2);
            ctx.fill();

            orbAnimationTime += 16;
            requestAnimationFrame(animateOrb);
        }

        // ============================================================================
        // THEME MANAGEMENT
        // ============================================================================

        function setTheme(theme) {
            STATE.theme = theme;
            localStorage.setItem(CONFIG.storagePrefix + 'theme', theme);

            if (theme === 'light') {
                document.documentElement.setAttribute('data-theme', 'light');
                document.getElementById('theme-meta').content = '#f2ecf8';
                DOM.themeText.textContent = 'Dark Mode';
            } else {
                document.documentElement.removeAttribute('data-theme');
                document.getElementById('theme-meta').content = '#0d0f1a';
                DOM.themeText.textContent = 'Light Mode';
            }
        }

        function toggleTheme() {
            setTheme(STATE.theme === 'dark' ? 'light' : 'dark');
        }

        // ============================================================================
        // INPUT HANDLING
        // ============================================================================

        function handleInputResize() {
            const input = DOM.messageInput;
            input.style.height = 'auto';
            input.style.height = Math.min(input.scrollHeight, 120) + 'px';
            DOM.sendBtn.disabled = !input.value.trim();
        }

        function handleInputKeydown(e) {
            if (e.key === 'Enter' && !e.shiftKey) {
                e.preventDefault();
                if (!DOM.sendBtn.disabled) {
                    sendMessage();
                }
            }
        }

        // ============================================================================
        // CAPABILITIES MANAGEMENT
        // ============================================================================

        function toggleCapabilities() {
            DOM.capabilitiesChips.classList.toggle('show');
        }

        function toggleCapability(button) {
            const capability = button.dataset.capability;
            button.classList.toggle('active');

            if (button.classList.contains('active')) {
                STATE.activeCapabilities.add(capability);
                if (capability === 'vision') {
                    DOM.fileInput.click();
                }
            } else {
                STATE.activeCapabilities.delete(capability);
                if (capability === 'vision') {
                    clearImagePreview();
                }
            }
        }

        function handleFileInput(event) {
            const file = event.target.files[0];
            if (!file) return;

            STATE.selectedFile = file;
            const reader = new FileReader();
            reader.onload = (e) => {
                DOM.previewImage.src = e.target.result;
                DOM.imagePreviewBox.classList.add('show');
            };
            reader.readAsDataURL(file);
        }

        function clearImagePreview() {
            STATE.selectedFile = null;
            DOM.imagePreviewBox.classList.remove('show');
            DOM.previewImage.src = '';
            DOM.fileInput.value = '';

            const visionChip = document.querySelector('[data-capability="vision"]');
            if (visionChip) {
                visionChip.classList.remove('active');
                STATE.activeCapabilities.delete('vision');
            }
        }

        // ============================================================================
        // CONFIG SHEET
        // ============================================================================

        function openConfig() {
            DOM.configSheet.classList.add('open');
        }

        function closeConfig() {
            DOM.configSheet.classList.remove('open');
            saveConfig();
        }

        function saveConfig() {
            STATE.config.flowise_url = DOM.flowise_url.value.trim();
            STATE.config.chatflow_id = DOM.chatflow_id.value.trim();
            STATE.config.api_key = DOM.api_key.value.trim();

            localStorage.setItem(CONFIG.storagePrefix + 'flowise_url', STATE.config.flowise_url);
            localStorage.setItem(CONFIG.storagePrefix + 'chatflow_id', STATE.config.chatflow_id);
            localStorage.setItem(CONFIG.storagePrefix + 'api_key', STATE.config.api_key);
        }

        function handleSheetOverlayClick(e) {
            if (e.target.classList.contains('sheet-overlay')) {
                closeConfig();
            }
        }

        function clearChat() {
            DOM.messagesContainer.innerHTML = '<div class="message assistant">Chat cleared. How can I help you?</div>';
            closeConfig();
        }

        // ============================================================================
        // EMOTION & CONNECTION
        // ============================================================================

        function toggleEmotionDropdown() {
            document.getElementById('emotion-dropdown').classList.toggle('show');
        }

        function selectEmotion(event, emoji, text) {
            event.stopPropagation();
            STATE.currentEmoji = emoji;
            STATE.currentEmotion = text;
            document.getElementById('emotion-emoji').textContent = emoji;
            document.getElementById('emotion-text').textContent = text;
            document.getElementById('emotion-dropdown').classList.remove('show');
            localStorage.setItem('noa_emoji', emoji);
            localStorage.setItem('noa_emotion', text);
        }

        function checkConnection() {
            const badge = document.getElementById('connection-badge');
            const text = document.getElementById('connection-text');

            if (!navigator.onLine) {
                badge.className = 'connection-badge offline';
                text.textContent = 'Sin conexión';
                return;
            }

            // Check if Flowise is reachable
            if (STATE.config.flowise_url) {
                const startTime = Date.now();
                fetch(STATE.config.flowise_url, { method: 'HEAD', mode: 'no-cors', cache: 'no-cache' })
                    .then(() => {
                        const latency = Date.now() - startTime;
                        if (latency > 3000) {
                            badge.className = 'connection-badge unstable';
                            text.textContent = 'Inestable';
                        } else {
                            badge.className = 'connection-badge online';
                            text.textContent = 'Conectado';
                        }
                    })
                    .catch(() => {
                        badge.className = 'connection-badge unstable';
                        text.textContent = 'Inestable';
                    });
            } else {
                // No URL configured, just check internet
                badge.className = 'connection-badge online';
                text.textContent = 'Conectado';
            }
        }

        // ============================================================================
        // MESSAGING
        // ============================================================================

        function addMessage(text, role, isImage = false) {
            const messageEl = document.createElement('div');
            messageEl.className = `message ${role}`;

            if (isImage) {
                messageEl.classList.add('image-preview');
                const img = document.createElement('img');
                img.src = text;
                messageEl.appendChild(img);
            } else {
                messageEl.textContent = text;
            }

            DOM.messagesContainer.appendChild(messageEl);
            scrollToBottom();
            return messageEl;
        }

        function addTypingIndicator() {
            const indicator = document.createElement('div');
            indicator.className = 'typing-indicator';
            indicator.id = 'typing-indicator';
            indicator.innerHTML = '<div class="typing-dot"></div><div class="typing-dot"></div><div class="typing-dot"></div>';
            DOM.messagesContainer.appendChild(indicator);
            scrollToBottom();
            return indicator;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typing-indicator');
            if (indicator) {
                indicator.remove();
            }
        }

        function scrollToBottom() {
            DOM.messagesContainer.scrollTop = DOM.messagesContainer.scrollHeight;
        }

        function setThinkingState(isThinking) {
            STATE.isThinking = isThinking;
            if (isThinking) {
                DOM.statusDot.classList.add('pulse');
                DOM.statusLabel.classList.add('active');
            } else {
                DOM.statusDot.classList.remove('pulse');
                DOM.statusLabel.classList.remove('active');
            }
        }

        async function sendMessage() {
            const message = DOM.messageInput.value.trim();
            if (!message || !STATE.config.flowise_url || !STATE.config.chatflow_id) {
                if (!STATE.config.flowise_url || !STATE.config.chatflow_id) {
                    addMessage('Please configure Flowise URL and Chatflow ID in settings.', 'assistant');
                }
                return;
            }

            // Clear input
            DOM.messageInput.value = '';
            handleInputResize();

            // Add user message
            addMessage(message, 'user');

            // Add image if present
            if (STATE.selectedFile) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    addMessage(e.target.result, 'user', true);
                };
                reader.readAsDataURL(STATE.selectedFile);
            }

            // Show typing indicator
            setThinkingState(true);
            addTypingIndicator();

            try {
                // Prepare request body
                const body = {
                    question: message
                };

                // Add capabilities metadata
                if (STATE.activeCapabilities.size > 0) {
                    body.capabilities = Array.from(STATE.activeCapabilities);
                }

                // Add image if present
                if (STATE.selectedFile && STATE.activeCapabilities.has('vision')) {
                    const base64 = await fileToBase64(STATE.selectedFile);
                    body.uploads = [{
                        data: base64,
                        type: 'file',
                        name: STATE.selectedFile.name,
                        mime: STATE.selectedFile.type
                    }];
                }

                // Build headers
                const headers = {
                    'Content-Type': 'application/json'
                };

                if (STATE.config.api_key) {
                    headers['Authorization'] = `Bearer ${STATE.config.api_key}`;
                }

                // Make request with streaming support
                const response = await fetch(
                    `${STATE.config.flowise_url}/api/v1/prediction/${STATE.config.chatflow_id}`,
                    {
                        method: 'POST',
                        headers: headers,
                        body: JSON.stringify(body)
                    }
                );

                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}: ${response.statusText}`);
                }

                removeTypingIndicator();

                // Check if response is streaming
                const contentType = response.headers.get('content-type');
                if (contentType && contentType.includes('text/event-stream')) {
                    // Handle streaming response
                    await handleStreamingResponse(response);
                } else {
                    // Handle regular JSON response
                    const data = await response.json();
                    const responseText = data.text || data.answer || JSON.stringify(data);
                    addMessage(responseText, 'assistant');
                }

                clearImagePreview();
            } catch (error) {
                removeTypingIndicator();
                console.error('Error:', error);
                addMessage(`Error: ${error.message}`, 'assistant');
            } finally {
                setThinkingState(false);
            }
        }

        async function handleStreamingResponse(response) {
            const reader = response.body.getReader();
            const decoder = new TextDecoder();
            let fullResponse = '';
            let messageEl = null;

            STATE.isStreaming = true;

            try {
                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value, { stream: true });
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.text) {
                                    fullResponse += data.text;

                                    if (!messageEl) {
                                        messageEl = addMessage(fullResponse, 'assistant');
                                    } else {
                                        messageEl.textContent = fullResponse;
                                    }
                                    scrollToBottom();
                                }
                            } catch (e) {
                                // Ignore parse errors
                            }
                        }
                    }
                }
            } finally {
                STATE.isStreaming = false;
                if (!messageEl && fullResponse) {
                    addMessage(fullResponse, 'assistant');
                }
            }
        }

        function fileToBase64(file) {
            return new Promise((resolve, reject) => {
                const reader = new FileReader();
                reader.readAsDataURL(file);
                reader.onload = () => resolve(reader.result);
                reader.onerror = (error) => reject(error);
            });
        }

        // ============================================================================
        // STARTUP
        // ============================================================================

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', init);
        } else {
            init();
        }
    </script>
</body>
</html>
